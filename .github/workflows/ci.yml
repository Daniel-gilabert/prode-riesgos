name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ '*' ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./proyecto_riesgo_prode/mega_app
      - name: Build
        run: npm run build
        working-directory: ./proyecto_riesgo_prode/mega_app
      - name: Start dev server
        run: |
          nohup npm run dev > /tmp/dev.log 2>&1 &
          echo $! > /tmp/next_pid
        working-directory: ./proyecto_riesgo_prode/mega_app
      - name: Run endpoint checks
        run: |
          # wait for server to be ready
          for i in {1..60}; do
            if curl -sS http://localhost:3000/ >/dev/null; then break; fi
            sleep 2
          done
          echo "-- RBAC Permissions --"; curl -sS -H "x-tenant-id: t1" -H "x-user-id: u1" -H "x-roles: admin" http://localhost:3000/api/rbac/permissions
          echo "-- BC/Power BI Readiness --"; curl -sS http://localhost:3000/api/bc_powerbi/readiness
          echo "-- BC/Power BI Model --"; curl -sS http://localhost:3000/api/bc_powerbi/model
        env:
          BASE_URL: http://localhost:3000
        working-directory: ./proyecto_riesgo_prode/mega_app
      - name: Stop server
        if: always()
        run: |
          kill $(cat /tmp/next_pid) || true
        shell: bash
